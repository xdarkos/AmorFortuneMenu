<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amor & Fortune | QR Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@200;300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a050;
            --gold-light: #e0c878;
            --gold-soft: #f0d78c;
            --dark: #0a0a0a;
            --dark-2: #141414;
            --dark-3: #1c1c1c;
            --cream: #f5f0e8;
            --text-light: #d4d4d4;
            --text-muted: #999999;
            --shadow-gold: 0 0 25px rgba(201, 160, 80, 0.25);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
            --desktop-max-width: 1300px;
            --card-radius: 20px;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            height: 100%;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #030303;
            color: var(--text-light);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(201, 160, 80, 0.05) 0%, transparent 75%);
            transition: background 0.3s;
            overflow-x: hidden;
        }

        body.no-scroll {
            overflow: hidden;
            touch-action: none;
        }

        /* Parçacık efekti – zarif ve sade */
        .particles-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            animation: floatUp 12s infinite;
            opacity: 0;
            filter: blur(0.5px);
        }

        .particle:nth-child(1) { left: 5%; animation-delay: 0s; width: 2.5px; height: 2.5px; }
        .particle:nth-child(2) { left: 15%; animation-delay: 1.3s; width: 1.5px; height: 1.5px; }
        .particle:nth-child(3) { left: 25%; animation-delay: 2.7s; width: 2px; height: 2px; }
        .particle:nth-child(4) { left: 35%; animation-delay: 0.6s; width: 1px; height: 1px; }
        .particle:nth-child(5) { left: 45%; animation-delay: 3.2s; width: 2px; height: 2px; }
        .particle:nth-child(6) { left: 55%; animation-delay: 1.9s; width: 1.5px; height: 1.5px; }
        .particle:nth-child(7) { left: 65%; animation-delay: 4.1s; width: 2px; height: 2px; }
        .particle:nth-child(8) { left: 75%; animation-delay: 2.3s; width: 1px; height: 1px; }
        .particle:nth-child(9) { left: 85%; animation-delay: 0.4s; width: 2px; height: 2px; }
        .particle:nth-child(10) { left: 92%; animation-delay: 3.6s; width: 1.5px; height: 1.5px; }

        @keyframes floatUp {
            0% { transform: translateY(108vh) scale(0); opacity: 0; }
            10% { opacity: 0.7; }
            30% { transform: translateY(70vh) scale(1.2); opacity: 0.6; }
            65% { transform: translateY(30vh) scale(0.6); opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .particle { animation: none; display: none; }
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(145deg, var(--dark) 0%, #0c0c0c 5%, var(--dark-2) 25%, #0a0a0a 100%);
            box-shadow: 0 0 120px rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 769px) {
            .main-container {
                max-width: var(--desktop-max-width);
                margin: 28px auto;
                border-radius: 36px;
                border: 1px solid rgba(201, 160, 80, 0.2);
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(201, 160, 80, 0.1);
            }
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(14px + var(--safe-top)) 20px 14px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 30;
            border-bottom: 1px solid rgba(201, 160, 80, 0.2);
        }

        @media (min-width: 769px) {
            .top-bar { padding: 20px 36px; border-radius: 36px 36px 0 0; }
        }

        .logo-small {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(201, 160, 80, 0.6);
            letter-spacing: 1.5px;
        }

        @media (min-width: 769px) {
            .logo-small { font-size: 2.4rem; }
        }

        .menu-toggle {
            width: 52px;
            height: 52px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(201, 160, 80, 0.6);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 0 25px rgba(201, 160, 80, 0.25);
            transition: all 0.3s var(--transition-smooth);
            z-index: 101;
            position: relative;
        }

        .menu-toggle:hover {
            border-color: var(--gold-light);
            transform: scale(1.02);
            background: rgba(40, 40, 40, 0.9);
            box-shadow: 0 0 35px rgba(201, 160, 80, 0.4);
        }

        .menu-bar {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--gold);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(201, 160, 80, 0.5);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
            transform-origin: center;
        }

        .menu-bar:nth-child(2) { background: var(--gold-light); }

        .menu-toggle.active .menu-bar:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
        .menu-toggle.active .menu-bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .menu-toggle.active .menu-bar:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .menu-panel {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #181818 0%, #0f0f0f 100%);
            border-radius: 32px;
            border: 1px solid rgba(201, 160, 80, 0.3);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .menu-overlay.active .menu-panel { transform: scale(1) translateY(0); }

        @media (min-width: 769px) {
            .menu-panel { max-width: 550px; border-radius: 40px; }
        }

        .menu-panel::-webkit-scrollbar { width: 4px; }
        .menu-panel::-webkit-scrollbar-track { background: transparent; }
        .menu-panel::-webkit-scrollbar-thumb { background: rgba(201, 160, 80, 0.4); border-radius: 10px; }

        .home-btn, .all-products-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            background: rgba(201, 160, 80, 0.08);
            border-bottom: 1px solid rgba(201, 160, 80, 0.2);
            cursor: pointer;
            color: var(--gold-light);
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 1.1rem;
            transition: all 0.2s;
            border: none;
            width: 100%;
            text-align: left;
            font-family: 'Montserrat', sans-serif;
        }

        .home-btn:active, .all-products-btn:active { background: rgba(201, 160, 80, 0.18); }
        @media (min-width: 769px) {
            .home-btn:hover, .all-products-btn:hover { background: rgba(201, 160, 80, 0.18); }
        }

        .home-btn svg, .all-products-btn svg {
            width: 26px;
            height: 26px;
            stroke: var(--gold);
            stroke-width: 1.6;
            fill: none;
        }

        .menu-category {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            color: var(--cream);
            font-weight: 500;
            letter-spacing: 1.5px;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .menu-category:active { background: rgba(201, 160, 80, 0.05); }
        @media (min-width: 769px) {
            .menu-category:hover { background: rgba(201, 160, 80, 0.05); }
        }

        .menu-category .cat-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .menu-category svg {
            width: 24px;
            height: 24px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }
        .menu-arrow {
            color: var(--gold);
            font-size: 1.3rem;
            transition: transform 0.35s;
        }
        .menu-category.open .menu-arrow { transform: rotate(90deg); }

        .sub-categories {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s var(--transition-smooth);
            background: rgba(0, 0, 0, 0.3);
        }

        .sub-category-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 24px 14px 54px;
            background: transparent;
            border: none;
            color: #bbb;
            font-size: 0.85rem;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s;
        }

        .sub-category-btn:active { color: var(--gold); background: rgba(201, 160, 80, 0.1); }
        @media (min-width: 769px) {
            .sub-category-btn:hover { color: var(--gold); background: rgba(201, 160, 80, 0.06); }
        }

        .content-area { flex: 1; padding: 0 0 20px; }
        @media (min-width: 769px) { .content-area { padding: 0 32px 32px; } }

        .welcome-section {
            text-align: center;
            padding: 40px 24px 32px;
            animation: fadeInUp 0.8s;
        }
        @media (min-width: 769px) { .welcome-section { padding: 60px 48px 48px; } }

        .welcome-icon { font-size: 3rem; margin-bottom: 12px; }
        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem;
            color: var(--gold);
            letter-spacing: 1px;
            text-shadow: 0 0 35px rgba(201, 160, 80, 0.5);
        }
        @media (min-width: 769px) { .welcome-title { font-size: 3rem; } }

        .welcome-text {
            font-size: 0.9rem;
            color: #bfbfbf;
            line-height: 1.7;
            max-width: 550px;
            margin: 12px auto 20px;
        }
        .welcome-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .welcome-line { width: 45px; height: 1px; background: var(--gold); }
        .welcome-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); }

        .category-banner {
            position: relative;
            width: 100%;
            height: 260px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            animation: fadeInUp 0.6s;
            margin-bottom: 20px;
            border-radius: 0 0 28px 28px;
        }
        @media (min-width: 769px) {
            .category-banner { height: 340px; border-radius: 28px; margin-bottom: 32px; }
        }
        .category-banner img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.45) contrast(1.05);
        }
        .banner-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 28px 24px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
        }
        .banner-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-light);
            margin-bottom: 6px;
            text-shadow: 0 2px 12px black;
        }
        .banner-desc { font-size: 0.85rem; color: #ececec; font-weight: 300; }
        @media (min-width: 769px) { .banner-title { font-size: 2.5rem; } .banner-desc { font-size: 1rem; } }

        .product-list-padding { padding: 0 16px 28px; }
        @media (min-width: 769px) { .product-list-padding { padding: 0; } }

        #productList { display: flex; flex-direction: column; gap: 18px; }
        @media (min-width: 640px) { #productList { gap: 22px; } }

        .category-group { margin-bottom: 32px; }
        .group-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--gold-light);
            padding: 12px 0 10px;
            margin-bottom: 16px;
            border-bottom: 2px solid rgba(201, 160, 80, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        @media (min-width: 769px) { .group-title { font-size: 1.9rem; margin-bottom: 24px; } }
        .group-title svg { width: 28px; height: 28px; stroke: var(--gold); stroke-width: 1.7; fill: none; }

        .menu-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(201, 160, 80, 0.15);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            animation: itemFade 0.5s both;
        }
        .menu-item:hover {
            background: rgba(30, 30, 30, 0.85);
            border-color: rgba(201, 160, 80, 0.45);
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.5);
        }
        .menu-item:active { transform: scale(0.98); }

        .item-image {
            width: 88px;
            height: 88px;
            min-width: 88px;
            border-radius: 18px;
            object-fit: cover;
            background: #262626;
            border: 1px solid rgba(201, 160, 80, 0.25);
        }
        @media (min-width: 769px) { .item-image { width: 100px; height: 100px; min-width: 100px; } }

        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
        .item-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--cream); font-weight: 600; }
        @media (min-width: 769px) { .item-name { font-size: 1.1rem; } }
        .item-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .price-badge-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .item-price { font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
        .badge {
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 30px;
            background: rgba(201, 160, 80, 0.18);
            color: var(--gold-light);
            border: 1px solid rgba(201, 160, 80, 0.4);
            font-weight: 600;
        }

        .empty-message { text-align: center; color: var(--text-muted); margin-top: 60px; font-style: italic; font-size: 1rem; }

        .cafe-footer {
            text-align: center;
            padding: 28px 20px calc(28px + var(--safe-bottom));
            border-top: 1px solid rgba(201, 160, 80, 0.12);
        }
        .footer-brand { font-family: 'Great Vibes', cursive; font-size: 1.7rem; color: var(--gold); opacity: 0.8; }
        .footer-info { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(28px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.35s, visibility 0.35s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
        .modal-card {
            background: linear-gradient(135deg, #222 0%, #111 100%);
            border: 1.5px solid rgba(201, 160, 80, 0.5);
            border-radius: 40px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px black;
            transform: translateY(25px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
        }
        @media (min-width: 769px) { .modal-card { max-width: 700px; } }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }
        .modal-close-btn {
            position: sticky;
            top: 16px;
            float: right;
            margin: 12px 16px 0 0;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--gold);
            color: var(--gold);
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 11;
            transition: all 0.2s;
        }
        .modal-close-btn:hover { background: rgba(201, 160, 80, 0.2); transform: scale(1.05); }
        .modal-image-wrap {
            width: 100%;
            height: 300px;
            background: #1a1a1a;
            border-radius: 40px 40px 0 0;
            overflow: hidden;
            border-bottom: 2px solid rgba(201, 160, 80, 0.3);
        }
        @media (min-width: 769px) { .modal-image-wrap { height: 360px; } }
        .modal-image { width: 100%; height: 100%; object-fit: cover; }
        .modal-body { padding: 20px 24px 30px; }
        .modal-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 5px 14px;
            border-radius: 40px;
            background: rgba(201, 160, 80, 0.2);
            color: var(--gold-light);
            margin-bottom: 12px;
        }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--cream); margin-bottom: 12px; }
        .modal-description { font-size: 0.9rem; color: #b8b8b8; line-height: 1.5; margin-bottom: 20px; }
        .modal-price-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; }
        .modal-price { font-size: 2rem; font-weight: 800; color: var(--gold); }
        .modal-category-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes itemFade {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="particles-container">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <span class="logo-small">Amor & Fortune</span>
            <div class="menu-toggle" id="menuToggle" role="button" aria-label="Menüyü aç">
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
            </div>
        </div>

        <!-- Overlay Menü -->
        <div class="menu-overlay" id="menuOverlay">
            <div class="menu-panel" id="menuPanel"></div>
        </div>

        <div class="content-area" id="contentArea">
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-icon">✨</div>
                <h1 class="welcome-title">Hoş Geldiniz</h1>
                <p class="welcome-text">Amor & Fortune'da lüks ve lezzetin büyüleyici dansına davetlisiniz. Seçkin menümüzle unutulmaz bir an.</p>
                <div class="welcome-divider">
                    <span class="welcome-line"></span>
                    <span class="welcome-diamond"></span>
                    <span class="welcome-line"></span>
                </div>
            </div>
            <div class="category-banner" id="categoryBanner" style="display:none;">
                <img src="" alt="" id="bannerImage">
                <div class="banner-overlay">
                    <h2 class="banner-title" id="bannerTitle"></h2>
                    <p class="banner-desc" id="bannerDesc"></p>
                </div>
            </div>
            <div class="product-list-padding">
                <div id="productList"></div>
            </div>
        </div>

        <footer class="cafe-footer">
            <p class="footer-brand">Amor & Fortune</p>
            <p class="footer-info">© 2025 • Lüks Kafe Deneyimi</p>
        </footer>
    </div>

    <!-- Ürün Detay Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <button class="modal-close-btn" id="modalCloseBtn">✕</button>
            <div class="modal-image-wrap">
                <img src="" alt="Ürün görseli" class="modal-image" id="modalImage"
                onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 stroke=%22%23c9a050%22%3E%3Crect x=%223%22 y=%223%22 width=%2218%22 height=%2218%22 rx=%222%22/%3E%3Ccircle cx=%228.5%22 cy=%228.5%22 r=%221.5%22/%3E%3Cpath d=%22M21 15l-5-5L5 21%22/%3E%3C/svg%3E';">
            </div>
            <div class="modal-body">
                <span class="modal-badge" id="modalBadge"></span>
                <h3 class="modal-title" id="modalTitle"></h3>
                <p class="modal-description" id="modalDesc"></p>
                <div class="modal-price-row">
                    <span class="modal-price" id="modalPrice"></span>
                    <span class="modal-category-tag" id="modalCategory"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- GÜNCELLENMİŞ SVG İKONLAR (Tatlı pasta dilimi & Şık içecek bardağı) ----------
            const icons = {
                all: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
                </svg>`,
                home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>`,
                yemekler: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tava gövdesi -->
    <path d="M4 12 A7 7 0 0 1 18 12"/>
    <path d="M4 12 L4 14 A7 7 0 0 0 18 14 L18 12"/>
    <!-- Sap -->
    <path d="M18 13 L23 9"/>
    <!-- Sap tutma yeri -->
    <path d="M22 9 L24 10"/>
</svg>`,
                tatlilar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Alt taban -->
    <ellipse cx="12" cy="19" rx="8" ry="2"/>
    <!-- Pasta gövdesi -->
    <path d="M4 19 L4 13 Q12 9 20 13 L20 19"/>
    <!-- Orta katman kreması -->
    <path d="M5 16 Q12 13 19 16" stroke-width="2"/>
    <!-- Üst süsleme -->
    <path d="M6 13 Q12 10 18 13" stroke-width="1.5"/>
    <!-- Mum -->
    <line x1="12" y1="13" x2="12" y2="7" stroke-width="2"/>
    <!-- Mum alevi -->
    <path d="M12 5 Q10 6 12 7 Q14 6 12 5z" fill="currentColor" opacity="0.6"/>
    <path d="M12 4.5 Q11 6 12 7 Q13 6 12 4.5z" fill="currentColor" opacity="0.8"/>
</svg>`,
                nargile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3h8v3H8z"/><path d="M9 6v4c0 3.31 2.69 6 6 6s6-2.69 6-6V6"/><path d="M14 16v5"/><path d="M10 21h8"/><path d="M5 10c-1 2-1 5 2 7"/>
                </svg>`,
                kahve: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 18h20"/><path d="M5 10h12v5a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-5z"/><path d="M17 12h2a2 2 0 0 1 0 4h-2"/><path d="M9 3v3"/><path d="M12 2v3"/><path d="M15 3v3"/>
                </svg>`,
                icecekler: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3 L16 3 L14 12 Q14 18 10 18 Q6 18 6 12 L8 3 Z"/>
                    <path d="M12 18 L12 22"/>
                    <path d="M9 22 L15 22"/>
                    <line x1="14" y1="5" x2="17" y2="2"/>
                    <circle cx="7" cy="5" r="1.5"/>
                </svg>`
            };

            // ---------- ÜRÜN VERİLERİ ----------
            const products = [
                { name: "Bonfile & Madlen", price: "₺520", badge: "Özel", desc: "Özenle marine edilmiş bonfile dilimleri, özel madlen sos ve karamelize soğan.", img: "https://images.unsplash.com/photo-1546833998-877b37c2e5c6?w=600&h=450&fit=crop", category: "yemekler", subcategory: "ana-yemekler" },
                { name: "Trüflü Fettuccine", price: "₺380", badge: "", desc: "El yapımı fettuccine, siyah trüf mantarı ve eski parmesan.", img: "https://images.unsplash.com/photo-1645112411341-6c4fd023714a?w=600&h=450&fit=crop", category: "yemekler", subcategory: "ana-yemekler" },
                { name: "Somon & Avokado", price: "₺450", badge: "Popüler", desc: "Kızarmış somon, avokado püresi ve limon emülsiyonu.", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=600&h=450&fit=crop", category: "yemekler", subcategory: "ana-yemekler" },
                { name: "Fortune Burger", price: "₺340", badge: "", desc: "200gr özel dana kıyması, cheddar ve brioche.", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&h=450&fit=crop", category: "yemekler", subcategory: "ana-yemekler" },
                { name: "Akdeniz Salatası", price: "₺280", badge: "", desc: "Taze roka, mozzarella ve balzamik glaze.", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&h=450&fit=crop", category: "yemekler", subcategory: "salatalar" },
                { name: "Çikolatalı Sufle", price: "₺190", badge: "Favori", desc: "Sıcak çikolatalı sufle, vanilyalı dondurma ile.", img: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=600&h=450&fit=crop", category: "tatlilar", subcategory: "sicak-tatlilar" },
                { name: "Cheesecake Orman Meyveli", price: "₺210", badge: "", desc: "New York cheesecake, taze orman meyveleri.", img: "https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=600&h=450&fit=crop", category: "tatlilar", subcategory: "soguk-tatlilar" },
                { name: "Özel Karışım Nargile", price: "₺350", badge: "Özel", desc: "Amor & Fortune özel blend, pürüzsüz içim.", img: "https://images.unsplash.com/photo-1572960251616-62b8b0f04edf?w=600&h=450&fit=crop", category: "nargile", subcategory: "ozel-karisimlar" },
                { name: "Meyve Aromalı Nargile", price: "₺300", badge: "", desc: "Üzüm, çilek, mango ve nane seçenekleri.", img: "https://images.unsplash.com/photo-1523371054106-bbf80586c38c?w=600&h=450&fit=crop", category: "nargile", subcategory: "meyve-aromali" },
                { name: "Premium Ice Nargile", price: "₺400", badge: "", desc: "Buzlu sistem, yoğun duman ve ferahlık.", img: "https://images.unsplash.com/photo-1549877452-9c387954fbc2?w=600&h=450&fit=crop", category: "nargile", subcategory: "ice-nargile" },
                { name: "Espresso", price: "₺85", badge: "", desc: "Çift çekilmiş özel kavrum, yoğun aromatik.", img: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&h=450&fit=crop", category: "kahve", subcategory: "sicak-kahveler" },
                { name: "Latte Art Özel", price: "₺120", badge: "İmza", desc: "Barista imzasıyla kadifemsi süt köpüğü.", img: "https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?w=600&h=450&fit=crop", category: "kahve", subcategory: "sicak-kahveler" },
                { name: "Türk Kahvesi", price: "₺70", badge: "", desc: "Bol köpüklü, geleneksel pişirme.", img: "https://images.unsplash.com/photo-1580722045030-9c8b2fcb95b7?w=600&h=450&fit=crop", category: "kahve", subcategory: "sicak-kahveler" },
                { name: "Cold Brew", price: "₺140", badge: "", desc: "12 saat soğuk demlenmiş, ferahlatıcı.", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&h=450&fit=crop", category: "kahve", subcategory: "soguk-kahveler" },
                { name: "Amor Mojito", price: "₺160", badge: "İmza", desc: "Taze nane, lime ve soda ile ferahlık.", img: "https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=600&h=450&fit=crop", category: "icecekler", subcategory: "soguk-icecekler" },
                { name: "Smoothie Bowl", price: "₺180", badge: "", desc: "Çilek, muz ve yaban mersini.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?w=600&h=450&fit=crop", category: "icecekler", subcategory: "smoothie" },
                { name: "Fortune Spritz", price: "₺200", badge: "", desc: "Özel narenciye ve maden suyu.", img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=600&h=450&fit=crop", category: "icecekler", subcategory: "soguk-icecekler" }
            ];

            const menuCategories = {
                "yemekler": { label: "Yemekler", icon: icons.yemekler, subs: { "ana-yemekler": "Ana Yemekler", "salatalar": "Salatalar" } },
                "tatlilar": { label: "Tatlılar", icon: icons.tatlilar, subs: { "sicak-tatlilar": "Sıcak Tatlılar", "soguk-tatlilar": "Soğuk Tatlılar" } },
                "nargile": { label: "Nargile", icon: icons.nargile, subs: { "ozel-karisimlar": "Özel Karışımlar", "meyve-aromali": "Meyve Aromalı", "ice-nargile": "Ice Nargile" } },
                "kahve": { label: "Kahve", icon: icons.kahve, subs: { "sicak-kahveler": "Sıcak Kahveler", "soguk-kahveler": "Soğuk Kahveler" } },
                "icecekler": { label: "İçecekler", icon: icons.icecekler, subs: { "soguk-icecekler": "Soğuk İçecekler", "smoothie": "Smoothie" } }
            };

            const banners = {
                "ana-yemekler": { img: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&h=400&fit=crop", title: "Ana Yemekler", desc: "Şefin özel dokunuşlarıyla lezzet zirvesi." },
                "salatalar": { img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800&h=400&fit=crop", title: "Salatalar", desc: "Taze ve ferah, doğanın tazeliği." },
                "sicak-tatlilar": { img: "https://images.unsplash.com/photo-1509365465985-25d11c17e812?w=800&h=400&fit=crop", title: "Sıcak Tatlılar", desc: "Fırından yeni çıkmış tatlı cenneti." },
                "soguk-tatlilar": { img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=800&h=400&fit=crop", title: "Soğuk Tatlılar", desc: "Serin ve lezzetli kaçamaklar." },
                "ozel-karisimlar": { img: "https://images.unsplash.com/photo-1549877452-9c387954fbc2?w=800&h=400&fit=crop", title: "Özel Karışımlar", desc: "Eşsiz aromalar, pürüzsüz keyif." },
                "meyve-aromali": { img: "https://images.unsplash.com/photo-1523371054106-bbf80586c38c?w=800&h=400&fit=crop", title: "Meyve Aromalı", desc: "Taze meyve bulutları." },
                "ice-nargile": { img: "https://images.unsplash.com/photo-1572960251616-62b8b0f04edf?w=800&h=400&fit=crop", title: "Ice Nargile", desc: "Buz gibi serinlik, yoğun duman." },
                "sicak-kahveler": { img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800&h=400&fit=crop", title: "Sıcak Kahveler", desc: "Elit kahve ritüeli." },
                "soguk-kahveler": { img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=800&h=400&fit=crop", title: "Soğuk Kahveler", desc: "Serinleten özel demler." },
                "soguk-icecekler": { img: "https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=800&h=400&fit=crop", title: "Soğuk İçecekler", desc: "Buz gibi ferahlık." },
                "smoothie": { img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?w=800&h=400&fit=crop", title: "Smoothie", desc: "Sağlıklı ve lezzetli." }
            };

            // ---------- DOM REFERANSLARI ----------
            const menuToggle = document.getElementById('menuToggle');
            const menuOverlay = document.getElementById('menuOverlay');
            const menuPanel = document.getElementById('menuPanel');
            const welcomeSection = document.getElementById('welcomeSection');
            const categoryBanner = document.getElementById('categoryBanner');
            const bannerImage = document.getElementById('bannerImage');
            const bannerTitle = document.getElementById('bannerTitle');
            const bannerDesc = document.getElementById('bannerDesc');
            const productList = document.getElementById('productList');
            const modalOverlayEl = document.getElementById('modalOverlay');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalPrice = document.getElementById('modalPrice');
            const modalBadge = document.getElementById('modalBadge');
            const modalCategory = document.getElementById('modalCategory');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            let currentFilter = { category: null, subcategory: null };

            function scrollToTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            }

            function openMenu() {
                menuOverlay.classList.add('active');
                menuToggle.classList.add('active');
                document.body.classList.add('no-scroll');
            }

            function closeMenu() {
                menuOverlay.classList.remove('active');
                menuToggle.classList.remove('active');
                document.body.classList.remove('no-scroll');
                const openCats = menuPanel.querySelectorAll('.menu-category.open');
                openCats.forEach(cat => cat.classList.remove('open'));
                const subDivs = menuPanel.querySelectorAll('.sub-categories');
                subDivs.forEach(sub => sub.style.maxHeight = '0');
            }

            function toggleMenu(e) {
                e.stopPropagation();
                if (menuOverlay.classList.contains('active')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            }

            menuOverlay.addEventListener('click', function(e) {
                if (e.target === menuOverlay) closeMenu();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (modalOverlayEl.classList.contains('active')) closeModal();
                    else if (menuOverlay.classList.contains('active')) closeMenu();
                }
            });

            menuToggle.addEventListener('click', toggleMenu);

            function buildMobileMenu() {
                menuPanel.innerHTML = '';

                // Ana Sayfa Butonu
                const homeBtn = document.createElement('button');
                homeBtn.className = 'home-btn';
                homeBtn.innerHTML = `${icons.home} <span>Ana Sayfa</span>`;
                homeBtn.addEventListener('click', function() {
                    window.location.href = 'index.html';
                });
                menuPanel.appendChild(homeBtn);

                // Tüm Ürünler Butonu
                const allBtn = document.createElement('div');
                allBtn.className = 'all-products-btn';
                allBtn.innerHTML = `${icons.all} <span>Tüm Ürünler</span>`;
                allBtn.addEventListener('click', function() {
                    applyFilter(null, null);
                    closeMenu();
                });
                menuPanel.appendChild(allBtn);

                // Kategoriler
                for (let [catKey, catData] of Object.entries(menuCategories)) {
                    const catDiv = document.createElement('div');
                    catDiv.className = 'menu-category';
                    catDiv.innerHTML = `<div class="cat-left">${catData.icon} <span>${catData.label}</span></div><span class="menu-arrow">›</span>`;

                    catDiv.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const wasOpen = this.classList.contains('open');
                        const allCats = menuPanel.querySelectorAll('.menu-category');
                        allCats.forEach(c => c.classList.remove('open'));
                        const allSubs = menuPanel.querySelectorAll('.sub-categories');
                        allSubs.forEach(s => s.style.maxHeight = '0');

                        if (!wasOpen) {
                            this.classList.add('open');
                            const subDiv = this.nextElementSibling;
                            if (subDiv && subDiv.classList.contains('sub-categories')) {
                                subDiv.style.maxHeight = subDiv.scrollHeight + 'px';
                            }
                        }
                    });

                    menuPanel.appendChild(catDiv);

                    if (Object.keys(catData.subs).length) {
                        const subDiv = document.createElement('div');
                        subDiv.className = 'sub-categories';
                        subDiv.style.maxHeight = '0';

                        for (let [subKey, subLabel] of Object.entries(catData.subs)) {
                            const subBtn = document.createElement('button');
                            subBtn.className = 'sub-category-btn';
                            subBtn.textContent = subLabel;
                            subBtn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                applyFilter(catKey, subKey);
                                closeMenu();
                            });
                            subDiv.appendChild(subBtn);
                        }
                        menuPanel.appendChild(subDiv);
                    }
                }
            }

            function applyFilter(catKey, subKey) {
                currentFilter = { category: catKey, subcategory: subKey };
                const isAll = !catKey && !subKey;

                welcomeSection.style.display = isAll ? 'block' : 'none';
                categoryBanner.style.display = isAll ? 'none' : 'block';

                if (!isAll && subKey && banners[subKey]) {
                    let b = banners[subKey];
                    bannerImage.src = b.img;
                    bannerTitle.textContent = b.title;
                    bannerDesc.textContent = b.desc;
                } else if (!isAll && catKey && !subKey) {
                    let fallback = {
                        img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&h=400&fit=crop",
                        title: menuCategories[catKey]?.label || catKey,
                        desc: "Lezzetli seçenekler."
                    };
                    bannerImage.src = fallback.img;
                    bannerTitle.textContent = fallback.title;
                    bannerDesc.textContent = fallback.desc;
                }

                renderProducts();
                scrollToTop();
            }

            function renderProducts() {
                let filtered = products;
                if (currentFilter.category) {
                    filtered = products.filter(p => p.category === currentFilter.category);
                    if (currentFilter.subcategory) {
                        filtered = filtered.filter(p => p.subcategory === currentFilter.subcategory);
                    }
                }

                productList.innerHTML = '';
                if (filtered.length === 0) {
                    productList.innerHTML = '<p class="empty-message">Bu kategoride ürün bulunamadı.</p>';
                    return;
                }

                if (!currentFilter.category) {
                    const grouped = {};
                    filtered.forEach(p => {
                        if (!grouped[p.category]) grouped[p.category] = [];
                        grouped[p.category].push(p);
                    });

                    ['yemekler', 'tatlilar', 'nargile', 'kahve', 'icecekler'].forEach(catKey => {
                        if (grouped[catKey] && grouped[catKey].length) {
                            const catData = menuCategories[catKey];
                            const groupDiv = document.createElement('div');
                            groupDiv.className = 'category-group';
                            groupDiv.innerHTML = `<h3 class="group-title">${catData.icon} ${catData.label}</h3>`;

                            const itemsDiv = document.createElement('div');
                            grouped[catKey].forEach((prod, idx) => {
                                itemsDiv.appendChild(createProductItem(prod, idx));
                            });
                            groupDiv.appendChild(itemsDiv);
                            productList.appendChild(groupDiv);
                        }
                    });
                } else {
                    filtered.forEach((prod, idx) => {
                        productList.appendChild(createProductItem(prod, idx));
                    });
                }
            }

            function createProductItem(prod, index) {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.style.animationDelay = `${index * 0.02}s`;
                item.innerHTML = `
                    <img src="${prod.img}" alt="${prod.name}" class="item-image" loading="lazy"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 stroke=%22%23c9a050%22%3E%3Crect x=%223%22 y=%223%22 width=%2218%22 height=%2218%22 rx=%222%22/%3E%3Ccircle cx=%228.5%22 cy=%228.5%22 r=%221.5%22/%3E%3Cpath d=%22M21 15l-5-5L5 21%22/%3E%3C/svg%3E';">
                    <div class="item-info">
                        <span class="item-name">${prod.name}</span>
                        <span class="item-desc">${prod.desc}</span>
                        <div class="price-badge-row">
                            <span class="item-price">${prod.price}</span>
                            ${prod.badge ? `<span class="badge">${prod.badge}</span>` : ''}
                        </div>
                    </div>
                `;
                item.addEventListener('click', function() {
                    openModal(prod);
                });
                return item;
            }

            function openModal(prod) {
                modalImage.src = prod.img;
                modalTitle.textContent = prod.name;
                modalDesc.textContent = prod.desc;
                modalPrice.textContent = prod.price;
                modalCategory.textContent = menuCategories[prod.category]?.label || prod.category;
                if (prod.badge) {
                    modalBadge.textContent = prod.badge;
                    modalBadge.style.display = 'inline-block';
                } else {
                    modalBadge.style.display = 'none';
                }
                document.body.classList.add('no-scroll');
                modalOverlayEl.classList.add('active');
            }

            function closeModal() {
                modalOverlayEl.classList.remove('active');
                document.body.classList.remove('no-scroll');
            }

            modalCloseBtn.addEventListener('click', closeModal);
            modalOverlayEl.addEventListener('click', function(e) {
                if (e.target === modalOverlayEl) closeModal();
            });

            buildMobileMenu();
            applyFilter(null, null);

            window.addEventListener('load', function() {
                scrollToTop();
            });
        })();
    </script>
</body>
</html>
</html>
