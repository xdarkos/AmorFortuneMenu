<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amor & Fortune | Lüks QR Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@200;300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a050;
            --gold-light: #e0c878;
            --dark: #0a0a0a;
            --dark-2: #141414;
            --dark-3: #1c1c1c;
            --cream: #f5f0e8;
            --text-light: #d4d4d4;
            --text-muted: #999999;
            --shadow-gold: 0 0 25px rgba(201,160,80,0.25);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; height:100%; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            color: var(--text-light);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(201,160,80,0.03) 0%, transparent 70%);
        }
        .particles-container { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .particle { position:absolute; width:1.5px; height:1.5px; background:var(--gold); border-radius:50%; animation:floatUp 9s infinite; opacity:0; box-shadow:0 0 5px var(--gold-light); }
        .particle:nth-child(1){left:5%;animation-delay:0s;}.particle:nth-child(2){left:15%;animation-delay:1.3s;}.particle:nth-child(3){left:25%;animation-delay:2.7s;}.particle:nth-child(4){left:35%;animation-delay:0.6s;}.particle:nth-child(5){left:45%;animation-delay:3.2s;}.particle:nth-child(6){left:55%;animation-delay:1.9s;}.particle:nth-child(7){left:65%;animation-delay:4.1s;}.particle:nth-child(8){left:75%;animation-delay:2.3s;}.particle:nth-child(9){left:85%;animation-delay:0.4s;}.particle:nth-child(10){left:92%;animation-delay:3.6s;}
        @keyframes floatUp { 0%{transform:translateY(108vh) scale(0);opacity:0;} 8%{opacity:0.85;} 25%{transform:translateY(72vh) scale(1.5);opacity:0.65;} 55%{transform:translateY(35vh) scale(0.7);opacity:0.25;} 100%{transform:translateY(-8vh) scale(0);opacity:0;} }

        .main-container {
            position:relative; z-index:1; width:100%; max-width:500px;
            min-height:100vh; min-height:100dvh;
            background: linear-gradient(180deg, var(--dark) 0%, #0f0f0f 8%, var(--dark-2) 28%, var(--dark) 58%, var(--dark-2) 100%);
            box-shadow: 0 0 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(201,160,80,0.06);
            display:flex; flex-direction:column;
        }
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding: calc(12px + var(--safe-top)) 16px 8px;
            background: rgba(10,10,10,0.85); backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            position:sticky; top:0; z-index:30;
            border-bottom:1px solid rgba(201,160,80,0.12);
        }
        .logo-small {
            font-family: 'Great Vibes', cursive;
            font-size:1.8rem; color:var(--gold);
            text-shadow:0 0 25px rgba(201,160,80,0.5);
            letter-spacing:1px;
        }
        .menu-toggle {
            width:38px; height:38px; background:transparent; border:1px solid rgba(201,160,80,0.3);
            border-radius:12px; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:5px; cursor:pointer;
        }
        .menu-toggle span { display:block; width:22px; height:2px; background:var(--gold); border-radius:2px; transition:all 0.3s; }
        .menu-toggle.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
        .menu-toggle.active span:nth-child(2) { opacity:0; }
        .menu-toggle.active span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

        .menu-overlay {
            position:fixed; inset:0; z-index:40;
            background:rgba(0,0,0,0.8); backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            display:flex; flex-direction:column; align-items:center;
            padding:80px 16px 40px; opacity:0; pointer-events:none;
            transition:opacity 0.4s;
        }
        .menu-overlay.active { opacity:1; pointer-events:auto; }
        .menu-panel {
            width:100%; max-width:400px;
            background:linear-gradient(160deg, #1a1a1a 0%, #111111 40%, #0d0d0d 100%);
            border-radius:24px; border:1px solid rgba(201,160,80,0.25);
            box-shadow:0 25px 70px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,160,80,0.08) inset;
            overflow:hidden; max-height:80vh; overflow-y:auto;
        }
        .menu-panel::-webkit-scrollbar { width:3px; }
        .menu-panel::-webkit-scrollbar-track { background:transparent; }
        .menu-panel::-webkit-scrollbar-thumb { background:rgba(201,160,80,0.3); border-radius:10px; }
        .all-products-btn {
            display:flex; align-items:center; gap:12px;
            padding:16px 20px; background:rgba(201,160,80,0.05);
            border-bottom:1px solid rgba(201,160,80,0.15);
            cursor:pointer; color:var(--gold-light); font-weight:500; letter-spacing:1px;
        }
        .all-products-btn:active { background:rgba(201,160,80,0.12); }
        .all-products-btn svg { width:24px; height:24px; fill:none; stroke:var(--gold); stroke-width:1.5; }
        .menu-category {
            display:flex; align-items:center; justify-content:space-between;
            padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.05);
            cursor:pointer; color:var(--cream); font-weight:500;
            letter-spacing:1.5px; font-size:0.95rem;
        }
        .menu-category:active { background:rgba(201,160,80,0.05); }
        .menu-category .cat-left { display:flex; align-items:center; gap:12px; }
        .menu-category svg { width:22px; height:22px; fill:none; stroke:var(--gold); stroke-width:1.5; }
        .menu-arrow { color:var(--gold); font-size:1.2rem; transition:transform 0.3s; }
        .menu-category.open .menu-arrow { transform:rotate(90deg); }
        .sub-categories {
            max-height:0; overflow:hidden; transition:max-height 0.5s var(--transition-smooth);
            background:rgba(0,0,0,0.2);
        }
        .sub-category-btn {
            display:block; width:100%; text-align:left;
            padding:12px 24px 12px 50px; background:transparent; border:none;
            color:var(--text-light); font-size:0.85rem;
            letter-spacing:2px; text-transform:uppercase;
            border-bottom:1px solid rgba(255,255,255,0.03);
            cursor:pointer; font-family:'Montserrat', sans-serif;
        }
        .sub-category-btn:active { color:var(--gold); background:rgba(201,160,80,0.08); }

        .content-area { flex:1; padding:0 0 20px; }

        /* Hoş Geldiniz */
        .welcome-section {
            text-align:center; padding:35px 20px 20px;
            animation: fadeInUp 0.8s;
        }
        .welcome-icon { font-size:2.5rem; margin-bottom:10px; }
        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size:2rem; color:var(--gold);
            letter-spacing:2px; margin-bottom:10px;
            text-shadow:0 0 30px rgba(201,160,80,0.4);
        }
        .welcome-text {
            font-size:0.8rem; color:var(--text-muted);
            line-height:1.6; font-weight:300;
            max-width:320px; margin:0 auto 16px;
        }
        .welcome-divider { display:flex; align-items:center; justify-content:center; gap:6px; }
        .welcome-line { width:30px; height:1px; background:var(--gold); }
        .welcome-diamond { width:5px; height:5px; background:var(--gold); transform:rotate(45deg); }

        /* Kategori Banner */
        .category-banner {
            position:relative; width:100%; height:240px;
            overflow:hidden; display:flex; align-items:flex-end;
            animation: fadeInUp 0.6s;
            margin-bottom:12px;
        }
        .category-banner img {
            position:absolute; top:0; left:0; width:100%; height:100%;
            object-fit:cover; filter:brightness(0.4);
        }
        .banner-overlay {
            position:relative; z-index:2; width:100%;
            padding:20px; background:linear-gradient(transparent, rgba(0,0,0,0.8));
            color:var(--cream);
        }
        .banner-title {
            font-family: 'Playfair Display', serif;
            font-size:1.8rem; font-weight:700; color:var(--gold-light);
            text-shadow:0 2px 10px rgba(0,0,0,0.5);
            margin-bottom:6px;
        }
        .banner-desc {
            font-size:0.75rem; color:var(--text-light);
            font-weight:300; line-height:1.4;
        }

        .product-list-padding { padding:0 14px 20px; }

        .section-title {
            font-family:'Playfair Display', serif;
            font-size:1.4rem; color:var(--cream);
            margin:8px 0 18px; letter-spacing:1px;
            text-align:center;
        }
        .category-group { margin-bottom:20px; }
        .group-title {
            font-family:'Playfair Display', serif;
            font-size:1.3rem; color:var(--gold-light);
            padding:8px 0; margin-bottom:8px;
            border-bottom:1px solid rgba(201,160,80,0.2);
            display:flex; align-items:center; gap:8px;
        }
        .group-title svg { width:22px; height:22px; fill:none; stroke:var(--gold); stroke-width:1.5; }

        .menu-item {
            display:flex; gap:12px; padding:10px; margin-bottom:10px;
            background:rgba(255,255,255,0.015);
            border:1px solid rgba(201,160,80,0.08); border-radius:14px;
            cursor:pointer; animation:itemFade 0.5s both;
            transition:all 0.3s;
        }
        .menu-item:active { transform:scale(0.98); }
        @keyframes itemFade { from{opacity:0;transform:translateY(14px);} }
        .item-image {
            width:70px; height:70px; min-width:70px; border-radius:10px;
            object-fit:contain; background:#111;
            border:2px solid rgba(201,160,80,0.18);
        }
        .item-info { flex:1; display:flex; flex-direction:column; justify-content:center; gap:3px; }
        .item-name { font-family:'Playfair Display', serif; font-size:0.9rem; color:var(--cream); }
        .item-desc { font-size:0.65rem; color:var(--text-muted); line-height:1.3; }
        .item-price { font-size:0.9rem; font-weight:700; color:var(--gold); }
        .badge { font-size:0.55rem; padding:2px 7px; border-radius:20px; background:rgba(201,160,80,0.15); color:var(--gold-light); border:1px solid rgba(201,160,80,0.25); white-space:nowrap; }
        .empty-message { text-align:center; color:var(--text-muted); margin-top:50px; }

        .cafe-footer {
            text-align:center; padding:20px 16px calc(20px + var(--safe-bottom));
            border-top:1px solid rgba(201,160,80,0.12);
        }
        .footer-brand { font-family:'Great Vibes', cursive; font-size:1.5rem; color:var(--gold); opacity:0.7; }
        .footer-info { font-size:0.6rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }

        .modal-overlay {
            position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.85);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            display:flex; align-items:center; justify-content:center;
            padding:16px; opacity:0; pointer-events:none; transition:opacity 0.35s;
        }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-card {
            background:linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 50%, #0a0a0a 100%);
            border:1.5px solid rgba(201,160,80,0.3);
            border-radius:24px; width:100%; max-width:420px;
            max-height:90vh; overflow-y:auto;
            box-shadow:0 30px 80px rgba(0,0,0,0.8);
            transform:translateY(30px) scale(0.92);
            transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.active .modal-card { transform:translateY(0) scale(1); }
        .modal-close-btn {
            position:sticky; top:12px; float:right; margin-right:12px;
            width:38px; height:38px; border-radius:50%;
            background:rgba(0,0,0,0.7); border:1px solid rgba(201,160,80,0.35);
            color:var(--gold); font-size:1.2rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .modal-image-wrap { width:100%; height:280px; background:#000; display:flex; align-items:center; justify-content:center; border-radius:24px 24px 0 0; overflow:hidden; }
        .modal-image { width:100%; height:100%; object-fit:contain; }
        .modal-body { padding:16px 20px 22px; }
        .modal-badge { display:inline-block; font-size:0.6rem; padding:4px 10px; border-radius:20px; background:rgba(201,160,80,0.15); color:var(--gold-light); text-transform:uppercase; letter-spacing:1.5px; border:1px solid rgba(201,160,80,0.3); margin-bottom:10px; }
        .modal-title { font-family:'Playfair Display', serif; font-size:1.8rem; font-weight:700; color:var(--cream); margin-bottom:8px; }
        .modal-description { font-size:0.85rem; color:#b0b0b0; line-height:1.6; font-weight:300; margin-bottom:16px; }
        .modal-price-row { display:flex; align-items:center; justify-content:space-between; }
        .modal-price { font-family:'Playfair Display', serif; font-size:2rem; font-weight:700; color:var(--gold); text-shadow:0 0 20px rgba(201,160,80,0.4); }
        .modal-category-tag { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; border:1px solid rgba(255,255,255,0.15); padding:6px 14px; border-radius:20px; }
        body.no-scroll { overflow:hidden; position:fixed; width:100%; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>

                { name:"Meyve Aromalı Nargile", price:"₺300", badge:"", desc:"Üzüm, çilek, mango ve nane seçenekleri.", img:"https://images.unsplash.com/photo-1523371054106-bbf80586c38c?w=600&h=450&fit=crop", category:"nargile", subcategory:"meyve-aromali" },
                { name:"Premium Ice Nargile", price:"₺400", badge:"", desc:"Buzlu sistem, yoğun duman ve ferahlık.", img:"https://images.unsplash.com/photo-1549877452-9c387954fbc2?w=600&h=450&fit=crop", category:"nargile", subcategory:"ice-nargile" },
                { name:"Espresso", price:"₺85", badge:"", desc:"Çift çekilmiş özel kavrum, yoğun aromatik.", img:"https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&h=450&fit=crop", category:"kahve", subcategory:"sicak-kahveler" },
                { name:"Latte Art Özel", price:"₺120", badge:"İmza", desc:"Barista imzasıyla kadifemsi süt köpüğü.", img:"https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?w=600&h=450&fit=crop", category:"kahve", subcategory:"sicak-kahveler" },
                { name:"Türk Kahvesi", price:"₺70", badge:"", desc:"Bol köpüklü, geleneksel pişirme.", img:"https://images.unsplash.com/photo-1580722045030-9c8b2fcb95b7?w=600&h=450&fit=crop", category:"kahve", subcategory:"sicak-kahveler" },
                { name:"Cold Brew", price:"₺140", badge:"", desc:"12 saat soğuk demlenmiş, ferahlatıcı.", img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&h=450&fit=crop", category:"kahve", subcategory:"soguk-kahveler" },
                { name:"Amor Mojito", price:"₺160", badge:"İmza", desc:"Taze nane, lime ve soda ile ferahlık.", img:"https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=600&h=450&fit=crop", category:"icecekler", subcategory:"soguk-icecekler" },
                { name:"Smoothie Bowl", price:"₺180", badge:"", desc:"Çilek, muz ve yaban mersini.", img:"https://images.unsplash.com/photo-1590301157890-4810ed352733?w=600&h=450&fit=crop", category:"icecekler", subcategory:"smoothie" },
                { name:"Fortune Spritz", price:"₺200", badge:"", desc:"Özel narenciye ve maden suyu.", img:"https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=600&h=450&fit=crop", category:"icecekler", subcategory:"soguk-icecekler" }
            ];

            const menuCategories = {
                "yemekler": { label:"Yemekler", icon: icons.yemekler, subs: {"ana-yemekler":"Ana Yemekler", "salatalar":"Salatalar"} },
                "tatlilar": { label:"Tatlılar", icon: icons.tatlilar, subs: {"sicak-tatlilar":"Sıcak Tatlılar", "soguk-tatlilar":"Soğuk Tatlılar"} },
                "nargile": { label:"Nargile", icon: icons.nargile, subs: {"ozel-karisimlar":"Özel Karışımlar", "meyve-aromali":"Meyve Aromalı", "ice-nargile":"Ice Nargile"} },
                "kahve": { label:"Kahve", icon: icons.kahve, subs: {"sicak-kahveler":"Sıcak Kahveler", "soguk-kahveler":"Soğuk Kahveler"} },
                "icecekler": { label:"İçecekler", icon: icons.icecekler, subs: {"soguk-icecekler":"Soğuk İçecekler", "smoothie":"Smoothie"} }
            };

            const banners = {
                "ana-yemekler": { img:"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=300&fit=crop", title:"Ana Yemekler", desc:"Şefin özenle hazırladığı, damaklarda iz bırakan lezzetler." },
                "salatalar": { img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&h=300&fit=crop", title:"Salatalar", desc:"Taze ve hafif seçeneklerle ferah bir mola." },
                "sicak-tatlilar": { img:"https://images.unsplash.com/photo-1509365465985-25d11c17e812?w=600&h=300&fit=crop", title:"Sıcak Tatlılar", desc:"Fırından yeni çıkmış sıcacık lezzetler." },
                "soguk-tatlilar": { img:"https://images.unsplash.com/photo-1488477181946-6428a0291777?w=600&h=300&fit=crop", title:"Soğuk Tatlılar", desc:"Serinleten, iştah açan tatlı alternatifleri." },
                "ozel-karisimlar": { img:"https://images.unsplash.com/photo-1549877452-9c387954fbc2?w=600&h=300&fit=crop", title:"Özel Karışımlar", desc:"Amor & Fortune'un kendine has nargile blendleri." },
                "meyve-aromali": { img:"https://images.unsplash.com/photo-1523371054106-bbf80586c38c?w=600&h=300&fit=crop", title:"Meyve Aromalı", desc:"En sevilen meyve aromalarıyla ferah bir keyif." },
                "ice-nargile": { img:"https://images.unsplash.com/photo-1572960251616-62b8b0f04edf?w=600&h=300&fit=crop", title:"Ice Nargile", desc:"Buz gibi serinlikte yoğun duman deneyimi." },
                "sicak-kahveler": { img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600&h=300&fit=crop", title:"Sıcak Kahveler", desc:"Elit çekirdeklerden hazırlanan sıcak kahve ritüeli." },
                "soguk-kahveler": { img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&h=300&fit=crop", title:"Soğuk Kahveler", desc:"Serinletici, özenle demlenmiş soğuk kahve seçenekleri." },
                "soguk-icecekler": { img:"https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=600&h=300&fit=crop", title:"Soğuk İçecekler", desc:"Buz gibi ferahlatıcı içecekler." },
                "smoothie": { img:"https://images.unsplash.com/photo-1590301157890-4810ed352733?w=600&h=300&fit=crop", title:"Smoothie", desc:"Taze meyvelerle hazırlanan sağlıklı ve lezzetli karışımlar." }
            };

            const menuToggle = document.getElementById('menuToggle');
            const menuOverlay = document.getElementById('menuOverlay');
            const menuPanel = document.getElementById('menuPanel');
            const welcomeSection = document.getElementById('welcomeSection');
            const categoryBanner = document.getElementById('categoryBanner');
            const bannerImage = document.getElementById('bannerImage');
            const bannerTitle = document.getElementById('bannerTitle');
            const bannerDesc = document.getElementById('bannerDesc');
            const productList = document.getElementById('productList');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalPrice = document.getElementById('modalPrice');
            const modalBadge = document.getElementById('modalBadge');
            const modalCategory = document.getElementById('modalCategory');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            let currentFilter = { category: null, subcategory: null };

            function buildMenu() {
                menuPanel.innerHTML = '';
                const allBtn = document.createElement('div');
                allBtn.className = 'all-products-btn';
                allBtn.innerHTML = `${icons.all} <span>Tüm Ürünler</span>`;
                allBtn.addEventListener('click', (e) => { e.stopPropagation(); applyFilter(null, null); closeMenu(); });
                menuPanel.appendChild(allBtn);

                for (let [catKey, catData] of Object.entries(menuCategories)) {
                    const catDiv = document.createElement('div');
                    catDiv.className = 'menu-category';
                    catDiv.innerHTML = `<div class="cat-left">${catData.icon} <span>${catData.label}</span></div><span class="menu-arrow">›</span>`;
                    catDiv.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const wasOpen = this.classList.contains('open');
                        document.querySelectorAll('.menu-category').forEach(c => c.classList.remove('open'));
                        document.querySelectorAll('.sub-categories').forEach(s => s.style.maxHeight = '0');
                        if (!wasOpen) {
                            this.classList.add('open');
                            const subDiv = this.nextElementSibling;
                            if (subDiv && subDiv.classList.contains('sub-categories')) {
                                subDiv.style.maxHeight = subDiv.scrollHeight + 'px';
                            }
                        }
                    });
                    menuPanel.appendChild(catDiv);

                    if (Object.keys(catData.subs).length > 0) {
                        const subDiv = document.createElement('div');
                        subDiv.className = 'sub-categories';
                        subDiv.style.maxHeight = '0';
                        for (let [subKey, subLabel] of Object.entries(catData.subs)) {
                            const subBtn = document.createElement('button');
                            subBtn.className = 'sub-category-btn';
                            subBtn.textContent = subLabel;
                            subBtn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                applyFilter(catKey, subKey);
                                closeMenu();
                            });
                            subDiv.appendChild(subBtn);
                        }
                        menuPanel.appendChild(subDiv);
                    }
                }
            }

            function applyFilter(catKey, subKey) {
                currentFilter.category = catKey;
                currentFilter.subcategory = subKey;
                const isAll = !catKey && !subKey;
                welcomeSection.style.display = isAll ? 'block' : 'none';
                categoryBanner.style.display = isAll ? 'none' : 'block';

                if (!isAll && subKey && banners[subKey]) {
                    const b = banners[subKey];
                    bannerImage.src = b.img;
                    bannerTitle.textContent = b.title;
                    bannerDesc.textContent = b.desc;
                } else if (!isAll && catKey && !subKey) {
                    // Category without subcategory (if ever)
                    const b = banners[catKey] || { img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&h=300&fit=crop", title:menuCategories[catKey]?.label||catKey, desc:"Lezzetli seçenekler." };
                    bannerImage.src = b.img;
                    bannerTitle.textContent = b.title;
                    bannerDesc.textContent = b.desc;
                }

                renderProducts();
                // Scroll to banner if category or subcategory selected
                if (!isAll) {
                    setTimeout(() => {
                        categoryBanner.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                } else {
                    setTimeout(() => {
                        welcomeSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            }

            function renderProducts() {
                let filtered = products;
                if (currentFilter.category) {
                    filtered = products.filter(p => p.category === currentFilter.category);
                    if (currentFilter.subcategory) {
                        filtered = filtered.filter(p => p.subcategory === currentFilter.subcategory);
                    }
                }

                productList.innerHTML = '';
                if (filtered.length === 0) {
                    productList.innerHTML = '<p class="empty-message">Bu kategoride ürün bulunamadı.</p>';
                    return;
                }

                if (!currentFilter.category) {
                    const grouped = {};
                    filtered.forEach(p => {
                        if (!grouped[p.category]) grouped[p.category] = [];
                        grouped[p.category].push(p);
                    });
                    ['yemekler', 'tatlilar', 'nargile', 'kahve', 'icecekler'].forEach(catKey => {
                        if (grouped[catKey] && grouped[catKey].length > 0) {
                            const catData = menuCategories[catKey];
                            const groupDiv = document.createElement('div');
                            groupDiv.className = 'category-group';
                            groupDiv.innerHTML = `<h3 class="group-title">${catData.icon} ${catData.label}</h3>`;
                            const itemsContainer = document.createElement('div');
                            grouped[catKey].forEach((prod, idx) => itemsContainer.appendChild(createProductItem(prod, idx)));
                            groupDiv.appendChild(itemsContainer);
                            productList.appendChild(groupDiv);
                        }
                    });
                } else {
                    filtered.forEach((prod, idx) => productList.appendChild(createProductItem(prod, idx)));
                }
            }

            function createProductItem(prod, index) {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.style.animationDelay = `${index * 0.03}s`;
                item.innerHTML = `
                    <img src="${prod.img}" alt="${prod.name}" class="item-image" loading="lazy" onerror="this.style.opacity='0.3'">
                    <div class="item-info">
                        <span class="item-name">${prod.name}</span>
                        <span class="item-desc">${prod.desc}</span>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="item-price">${prod.price}</span>
                            ${prod.badge ? `<span class="badge">${prod.badge}</span>` : ''}
                        </div>
                    </div>
                `;
                item.addEventListener('click', () => openModal(prod));
                return item;
            }

            function openModal(prod) {
                modalImage.src = prod.img;
                modalTitle.textContent = prod.name;
                modalDesc.textContent = prod.desc;
                modalPrice.textContent = prod.price;
                modalCategory.textContent = menuCategories[prod.category]?.label || prod.category;
                if (prod.badge) { modalBadge.textContent = prod.badge; modalBadge.style.display = 'inline-block'; }
                else { modalBadge.style.display = 'none'; }
                modalOverlay.classList.add('active');
                document.body.classList.add('no-scroll');
                document.querySelector('.modal-card').scrollTop = 0;
                setTimeout(() => modalCloseBtn.focus(), 300);
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.classList.remove('no-scroll');
            }

            modalCloseBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal(); });

            function closeMenu() {
                menuOverlay.classList.remove('active');
                menuToggle.classList.remove('active');
                document.body.style.overflow = '';
                document.querySelectorAll('.menu-category.open').forEach(c => c.classList.remove('open'));
                document.querySelectorAll('.sub-categories').forEach(s => s.style.maxHeight = '0');
            }

            menuToggle.addEventListener('click', () => {
                if (menuOverlay.classList.contains('active')) closeMenu();
                else {
                    menuOverlay.classList.add('active');
                    menuToggle.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            });
            menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenu(); });

            buildMenu();
            applyFilter(null, null);
        })();
    </script>
</body>
</html>
